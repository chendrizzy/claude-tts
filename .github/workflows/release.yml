name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Tag must match pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJ="$(uv run python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "tag=$TAG pyproject=$PROJ"
          test "$TAG" = "$PROJ" || { echo "::error::tag v$TAG != pyproject $PROJ"; exit 1; }

      - name: Binding quality gate
        run: uv sync --extra edge --extra dev && uv run make verify

      - name: Build source tarball
        run: git archive --format=tar.gz -o "claude-tts-${GITHUB_REF_NAME}.tar.gz" HEAD

      - name: Create GitHub release
        run: gh release create "${GITHUB_REF_NAME}" "claude-tts-${GITHUB_REF_NAME}.tar.gz" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
