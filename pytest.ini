[pytest]
testpaths = tests
# Register custom markers so async/live tests don't emit UnknownMark warnings
# and can be selected/deselected. Async tests require pytest-asyncio
# (pip install pytest-asyncio); they are NOT part of the `make verify` gate.
markers =
    asyncio: async test (requires pytest-asyncio plugin)
    live_corpus: reads the live shadow.log; skipped if absent
    live_model: requires a running Ollama `model` model; skipped if unavailable
filterwarnings =
    ignore::DeprecationWarning
